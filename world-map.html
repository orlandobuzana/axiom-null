<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AXIOM NULL — World Map</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #060608;
    --deep: #0c0c12;
    --void: #10101a;
    --bone: #e8e0d0;
    --ash: #9a9590;
    --rust: #c44a2a;
    --cold: #3a7fbf;
    --pulse: #00d4aa;
    --dim-pulse: rgba(0,212,170,0.12);
    --gold: #b8922a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }

  body {
    background: var(--black);
    color: var(--bone);
    font-family: 'Cormorant Garamond', serif;
  }

  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 1000; pointer-events: none;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px);
  }

  /* TOPBAR */
  #topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 200;
    height: 42px;
    background: rgba(6,6,8,0.97);
    border-bottom: 1px solid rgba(255,255,255,0.05);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 1.5rem;
    backdrop-filter: blur(8px);
  }

  .tb-back {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.56rem; letter-spacing: 0.25em;
    color: rgba(255,255,255,0.2); text-decoration: none;
    text-transform: uppercase; transition: color 0.2s;
  }
  .tb-back:hover { color: var(--bone); }

  .tb-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.55rem; letter-spacing: 0.3em;
    color: rgba(255,255,255,0.1); text-transform: uppercase;
  }

  .tb-coords {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.52rem; letter-spacing: 0.15em;
    color: rgba(0,212,170,0.3);
  }

  /* FILTER BAR */
  #filterbar {
    position: fixed; top: 42px; left: 0; right: 0; z-index: 199;
    height: 38px;
    background: rgba(6,6,8,0.95);
    border-bottom: 1px solid rgba(255,255,255,0.04);
    display: flex; align-items: center;
    padding: 0 1.5rem; gap: 2px;
    backdrop-filter: blur(8px);
  }

  .filter-btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.52rem; letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 4px 12px; height: 26px;
    border: 1px solid rgba(255,255,255,0.07);
    background: transparent;
    color: rgba(255,255,255,0.22);
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; gap: 6px;
  }

  .filter-btn:hover { color: var(--bone); border-color: rgba(255,255,255,0.18); }

  .filter-btn.active {
    color: var(--bone);
    border-color: var(--btn-color);
    background: rgba(255,255,255,0.03);
  }

  .fdot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--btn-color); flex-shrink: 0;
  }

  /* MAP */
  #map-wrap {
    position: fixed;
    top: 80px; left: 0; right: 0; bottom: 0;
    background: #07090f;
    cursor: crosshair;
    overflow: hidden;
  }

  #map-wrap::before {
    content: '';
    position: absolute; inset: 0; z-index: 1; pointer-events: none;
    background-image:
      linear-gradient(rgba(0,212,170,0.022) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,170,0.022) 1px, transparent 1px);
    background-size: 70px 70px;
  }

  #map-svg {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%; z-index: 2;
  }

  /* PINS */
  .pin-group { cursor: pointer; }

  .pin-pulse {
    animation: pinPulse 2.5s ease-out infinite;
    transform-box: fill-box;
    transform-origin: center;
  }

  @keyframes pinPulse {
    0%   { opacity: 0.6; r: 5; }
    100% { opacity: 0;   r: 16; }
  }

  .pin-group:hover .pin-label { opacity: 1 !important; }
  .pin-group:hover .pin-dot   { r: 5 !important; }

  /* TOOLTIP */
  #tooltip {
    position: fixed; z-index: 500;
    background: rgba(6,6,8,0.97);
    border: 1px solid rgba(255,255,255,0.06);
    border-top: 2px solid var(--tc, var(--pulse));
    padding: 1rem 1.3rem;
    max-width: 285px; min-width: 220px;
    pointer-events: none;
    opacity: 0; transition: opacity 0.15s;
    box-shadow: 0 12px 40px rgba(0,0,0,0.7);
  }
  #tooltip.on { opacity: 1; }

  .tt-type {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.5rem; letter-spacing: 0.3em;
    text-transform: uppercase; margin-bottom: 0.45rem;
  }
  .tt-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.25rem; letter-spacing: 0.04em;
    color: var(--bone); line-height: 1; margin-bottom: 0.55rem;
  }
  .tt-desc {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic; font-size: 0.77rem;
    color: rgba(232,224,208,0.68); line-height: 1.55;
  }

  /* LEGEND */
  #legend {
    position: fixed; bottom: 1.5rem; left: 1.5rem; z-index: 300;
    background: rgba(6,6,8,0.92);
    border: 1px solid rgba(255,255,255,0.05);
    padding: 0.9rem 1.1rem;
    backdrop-filter: blur(8px);
  }

  .leg-head {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.5rem; letter-spacing: 0.3em;
    color: rgba(255,255,255,0.18); text-transform: uppercase;
    margin-bottom: 0.7rem; padding-bottom: 0.45rem;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  .leg-row {
    display: flex; align-items: center; gap: 7px;
    margin-bottom: 0.38rem;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.48rem; letter-spacing: 0.15em;
    color: rgba(255,255,255,0.28); text-transform: uppercase;
  }

  .ldot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .ldiamond {
    width: 7px; height: 7px; flex-shrink: 0;
    transform: rotate(45deg);
    border: 1.5px solid var(--rust);
  }
  .ltri {
    width: 0; height: 0; flex-shrink: 0;
    border-left: 4px solid transparent;
    border-right: 4px solid transparent;
    border-bottom: 7px solid var(--cold);
  }
  .lring {
    width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
    border: 1.5px dashed var(--gold);
    background: transparent;
  }

  /* COMPASS */
  #compass {
    position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 300;
    width: 58px; height: 58px;
  }

  /* COUNT */
  #countbar {
    position: fixed; bottom: 1.5rem;
    left: 50%; transform: translateX(-50%);
    z-index: 300;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.5rem; letter-spacing: 0.25em;
    color: rgba(0,212,170,0.22); text-transform: uppercase;
    white-space: nowrap;
  }
</style>
</head>

<div id="countbar"><span id="count-txt">21 Locations · All Visible</span></div>

<script>
  const typeLabels = {
    enclave: 'Surviving Enclave',
    lattice: 'Lattice Wasteland',
    faction: 'Faction Stronghold',
    quiet:   'Quiet Zone'
  };
  const typeColors = {
    enclave: '#4a9a5a',
    lattice: '#c44a2a',
    faction: '#3a7fbf',
    quiet:   '#b8922a'
  };

  const tooltip = document.getElementById('tooltip');
  const pins = document.querySelectorAll('.pin-group');

  pins.forEach(pin => {
    pin.addEventListener('mouseenter', e => {
      const t = pin.dataset.type;
      const c = typeColors[t] || 'var(--pulse)';
      tooltip.style.setProperty('--tc', c);
      tooltip.querySelector('.tt-type').textContent = typeLabels[t] || t;
      tooltip.querySelector('.tt-type').style.color = c;
      tooltip.querySelector('.tt-name').textContent = pin.dataset.name;
      tooltip.querySelector('.tt-desc').textContent = pin.dataset.desc;
      tooltip.classList.add('on');
      move(e);
    });
    pin.addEventListener('mousemove', move);
    pin.addEventListener('mouseleave', () => tooltip.classList.remove('on'));
  });

  function move(e) {
    const w = 290, h = 165;
    let x = e.clientX + 16, y = e.clientY - 18;
    if (x + w > window.innerWidth - 8) x = e.clientX - w - 16;
    if (y + h > window.innerHeight - 8) y = e.clientY - h - 8;
    tooltip.style.left = x + 'px';
    tooltip.style.top  = y + 'px';
  }

  // Live coordinates
  const mapWrap = document.getElementById('map-wrap');
  const coordEl = document.getElementById('coords');
  mapWrap.addEventListener('mousemove', e => {
    const r = mapWrap.getBoundingClientRect();
    const lon = ((e.clientX - r.left) / r.width * 360 - 180).toFixed(1);
    const lat = (90 - (e.clientY - r.top) / r.height * 180).toFixed(1);
    coordEl.textContent = `LAT ${lat > 0 ? '+' : ''}${lat}° · LON ${lon > 0 ? '+' : ''}${lon}°`;
  });
  mapWrap.addEventListener('mouseleave', () => { coordEl.textContent = 'LAT — · LON —'; });

  // Filters
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const f = btn.dataset.filter;
      let n = 0;
      pins.forEach(p => {
        const show = f === 'all' || p.dataset.type === f;
        p.style.opacity = show ? '1' : '0.06';
        p.style.pointerEvents = show ? 'all' : 'none';
        if (show) n++;
      });
      const lbl = f === 'all' ? 'All Visible' : typeLabels[f] + 's';
      document.getElementById('count-txt').textContent = `${n} Location${n!==1?'s':''} · ${lbl}`;
    });
  });
</script>
